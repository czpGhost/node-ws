<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ghostczp | Official</title>
    <style>
        /* 基础样式 - 极致黑白 */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #000;
            color: #fff;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .container {
            text-align: center;
            z-index: 1;
        }

        h1 {
            font-size: 4rem;
            letter-spacing: 10px;
            text-transform: uppercase;
            margin-bottom: 20px;
            animation: flicker 2s infinite alternate;
        }

        p {
            font-size: 1.2rem;
            opacity: 0.7;
            border-top: 1px solid #fff;
            border-bottom: 1px solid #fff;
            padding: 10px 0;
        }

        /* 简单的动画效果 */
        @keyframes flicker {
            0%, 19%, 21%, 23%, 25%, 54%, 56%, 100% { opacity: 1; }
            20%, 24%, 55% { opacity: 0.3; }
        }

        /* 装饰背景 */
        .glitch-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, #000 25%, #111 25%, #111 50%, #000 50%, #000 75%, #111 75%, #111 100%);
            background-size: 40px 40px;
            opacity: 0.1;
            z-index: 0;
        }
    </style>
</head>
<body>

    <div class="glitch-bg"></div>

    <div class="container">
        <h1>Ghostczp</h1>
        <p>THE DIGITAL SHADOW IS WATCHING</p>
    </div>

</body>
</html>
